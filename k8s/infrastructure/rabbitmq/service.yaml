apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: hustsim
  labels:
    app: rabbitmq
    app.kubernetes.io/part-of: hustsimulator
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management
