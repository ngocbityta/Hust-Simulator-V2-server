apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: hustsim
  labels:
    app: livekit
    app.kubernetes.io/part-of: hustsimulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      containers:
        - name: livekit
          image: livekit/livekit-server:v1.5
          args:
            - --config
            - /etc/livekit.yaml
          env:
            - name: LIVEKIT_PORT
              value: "7880"
          ports:
            - containerPort: 7880
              name: http
            - containerPort: 7881
              name: rtc-tcp
            - containerPort: 7882
              protocol: UDP
              name: rtc-udp
          resources:
            requests:
              cpu: "200m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: livekit-config
              mountPath: /etc/livekit.yaml
              subPath: livekit.yaml
      volumes:
        - name: livekit-config
          configMap:
            name: livekit-config
