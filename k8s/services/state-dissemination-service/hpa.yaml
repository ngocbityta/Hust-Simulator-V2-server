apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: state-dissemination-service-hpa
  namespace: hustsim
  labels:
    app: state-dissemination-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: state-dissemination-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
