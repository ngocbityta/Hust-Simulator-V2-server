apiVersion: apps/v1
kind: Deployment
metadata:
  name: state-dissemination-service
  namespace: hustsim
  labels:
    app: state-dissemination-service
    app.kubernetes.io/part-of: hustsimulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: state-dissemination-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: state-dissemination-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: state-dissemination-service
          image: asia-southeast1-docker.pkg.dev/hustsimulator/hustsim-repo/state-dissemination-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: ws
          envFrom:
            - configMapRef:
                name: hustsim-config
            - secretRef:
                name: hustsim-secrets
          env:
            # Dùng K8s Downward API để lấy pod name làm unique node ID
            - name: DISS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
