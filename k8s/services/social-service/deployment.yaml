apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-service
  namespace: hustsim
  labels:
    app: social-service
    app.kubernetes.io/part-of: hustsimulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: social-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: social-service
          image: asia-southeast1-docker.pkg.dev/hustsimulator/hustsim-repo/social-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              name: http
            - containerPort: 9092
              name: socketio
          envFrom:
            - configMapRef:
                name: hustsim-config
            - secretRef:
                name: hustsim-secrets
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/firebase/service-account.json"
            - name: POSTGRES_DB
              value: "hustsim_social"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hustsim-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hustsim-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: "social"
            - name: OTLP_ENDPOINT
              value: "http://jaeger:4318/v1/traces"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          volumeMounts:
            - name: firebase-credentials
              mountPath: /etc/firebase
              readOnly: true
      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-credentials
