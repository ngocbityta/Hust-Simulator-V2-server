apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: hustsim
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.50
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - containerPort: 16686
          name: query-ui
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        - containerPort: 14250
          name: grpc
        - containerPort: 14268
          name: http-c-thrift
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: hustsim
spec:
  type: NodePort
  ports:
  - name: query-ui
    port: 16686
    targetPort: 16686
    nodePort: 31686
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: grpc
    port: 14250
    targetPort: 14250
  selector:
    app: jaeger
