apiVersion: apps/v1
kind: Deployment
metadata:
  name: state-computation-service
  namespace: hustsim
  labels:
    app: state-computation-service
    app.kubernetes.io/part-of: hustsimulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: state-computation-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: state-computation-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3003"
    spec:
      containers:
        - name: state-computation-service
          image: asia-southeast1-docker.pkg.dev/hustsimulator/hustsim-repo/state-computation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: hustsim-config
            - secretRef:
                name: hustsim-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "750m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
