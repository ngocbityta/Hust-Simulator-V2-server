# NodePort để truy cập từ host machine qua minikube
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hustsim
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: hustsimulator
  annotations:
    cloud.google.com/backend-config: '{"default": "api-gateway-backendconfig"}'
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
      name: http
