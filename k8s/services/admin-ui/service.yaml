apiVersion: v1
kind: Service
metadata:
  name: admin-ui
  namespace: hustsim
  labels:
    app: admin-ui
  annotations:
    cloud.google.com/backend-config: '{"default": "api-gateway-backendconfig"}'
spec:
  type: NodePort
  selector:
    app: admin-ui
  ports:
    - port: 80
      targetPort: 80
      name: http
