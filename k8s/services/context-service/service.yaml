apiVersion: v1
kind: Service
metadata:
  name: context-service
  namespace: hustsim
  labels:
    app: context-service
    app.kubernetes.io/part-of: hustsimulator
spec:
  type: ClusterIP
  selector:
    app: context-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 50052
      targetPort: 50052
      name: grpc
