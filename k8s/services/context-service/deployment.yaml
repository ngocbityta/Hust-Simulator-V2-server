apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-service
  namespace: hustsim
  labels:
    app: context-service
    app.kubernetes.io/part-of: hustsimulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: context-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: context-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: context-service
          image: hustsim/context-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50052
              name: grpc
          envFrom:
            - configMapRef:
                name: hustsim-config
            - secretRef:
                name: hustsim-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?currentSchema=context&sslmode=$(POSTGRES_SSL)&channel_binding=$(POSTGRES_CHANNEL_BINDING)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hustsim-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hustsim-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: "context"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
