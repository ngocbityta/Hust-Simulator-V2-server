# Interest Matcher — StatefulSet
# Mỗi pod có hostname cố định: interest-matcher-{0,1,2}
# ZONE_ID được tự động trích xuất từ ordinal index trong hostname
# Peer discovery qua headless service DNS:
#   interest-matcher-0.interest-matcher.hustsim.svc.cluster.local
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: interest-matcher
  namespace: hustsim
  labels:
    app: interest-matcher
    app.kubernetes.io/part-of: hustsimulator
spec:
  serviceName: interest-matcher
  replicas: 3
  selector:
    matchLabels:
      app: interest-matcher
  template:
    metadata:
      labels:
        app: interest-matcher
    spec:
      containers:
        - name: interest-matcher
          image: asia-southeast1-docker.pkg.dev/hustsimulator/hustsim-repo/interest-matcher-service:latest
          imagePullPolicy: Always         # Tự tính ZONE_ID từ hostname ordinal + cấu hình NEIGHBOR_BROKERS
          command:
            - sh
            - -c
            - |
              # Extract ordinal: interest-matcher-0 → 0
              export ZONE_ID=${HOSTNAME##*-}
              
              # Tính port cho zone này (sử dụng cổng động để khớp với client)
              export IM_PORT=$((4000 + ZONE_ID))
              export IM_BASE_PORT=4000
              
              # Xây dựng NEIGHBOR_BROKERS dựa trên ZONE_ID
              TOTAL_ZONES=3
              NEIGHBORS=""
              for i in $(seq 0 $((TOTAL_ZONES - 1))); do
                if [ "$i" != "$ZONE_ID" ]; then
                  PEER_PORT=$((4000 + i))
                  PEER_HOST="interest-matcher-${i}.interest-matcher"
                  if [ -n "$NEIGHBORS" ]; then
                    NEIGHBORS="${NEIGHBORS},"
                  fi
                  # Chỉ thêm neighbor liền kề (zone ±1)
                  DIFF=$((ZONE_ID - i))
                  if [ "$DIFF" = "1" ] || [ "$DIFF" = "-1" ]; then
                    NEIGHBORS="${NEIGHBORS}${PEER_HOST}:${PEER_PORT}:${i}"
                  fi
                fi
              done
              export NEIGHBOR_BROKERS="$NEIGHBORS"
              
              echo "Starting Interest Matcher: ZONE_ID=$ZONE_ID PORT=$IM_PORT NEIGHBORS=$NEIGHBOR_BROKERS"
              exec node dist/main
          ports:
            - containerPort: 4000
              name: grpc-0
            - containerPort: 4001
              name: grpc-1
            - containerPort: 4002
              name: grpc-2
          envFrom:
            - configMapRef:
                name: hustsim-config
            - secretRef:
                name: hustsim-secrets
          env:
            - name: OTLP_ENDPOINT
              value: "http://jaeger:4318/v1/traces"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "const port = 4000 + parseInt(require('os').hostname().split('-').pop() || '0', 10); require('net').connect(port, '127.0.0.1').on('error', () => process.exit(1)).on('connect', () => process.exit(0))"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "const port = 4000 + parseInt(require('os').hostname().split('-').pop() || '0', 10); require('net').connect(port, '127.0.0.1').on('error', () => process.exit(1)).on('connect', () => process.exit(0))"
            initialDelaySeconds: 15
            periodSeconds: 15
