apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-service
  namespace: hustsim
  labels:
    app: streaming-service
    app.kubernetes.io/part-of: hustsimulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streaming-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: streaming-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8084"
    spec:
      containers:
        - name: streaming-service
          image: asia-southeast1-docker.pkg.dev/hustsimulator/hustsim-repo/streaming-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              name: http
          envFrom:
            - configMapRef:
                name: hustsim-config
            - secretRef:
                name: hustsim-secrets
          env:
            - name: POSTGRES_DB
              value: "hustsim_streaming"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hustsim-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hustsim-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: "streaming"
            - name: OTLP_ENDPOINT
              value: "http://jaeger:4318/v1/traces"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 35
