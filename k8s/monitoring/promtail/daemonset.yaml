# Promtail DaemonSet — chạy 1 instance trên mỗi K8s node
# Thu thập log từ tất cả pods chạy trên node đó
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: hustsim
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.hustsim.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods-static
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/containers/*_hustsim_*.log
        pipeline_stages:
          - regex:
              expression: "^/var/log/containers/(?P<pod>[a-zA-Z0-9_-]+)_(?P<namespace>[a-zA-Z0-9_-]+)_(?P<container>[a-zA-Z0-9_-]+)-(?P<container_id>[a-zA-Z0-9]+)\\.log$"
              source: filename
          - labels:
              pod:
              namespace:
              container:
              app: container
          - cri: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: hustsim
  labels:
    app: promtail
    app.kubernetes.io/part-of: hustsimulator
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail/promtail.yaml
              subPath: promtail.yaml
            - name: pods-log
              mountPath: /var/log/pods
              readOnly: true
            - name: containers-log
              mountPath: /var/log/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods-log
          hostPath:
            path: /var/log/pods
        - name: containers-log
          hostPath:
            path: /var/log/containers
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: hustsim
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hustsim-promtail
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hustsim-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: hustsim
roleRef:
  kind: ClusterRole
  name: hustsim-promtail
  apiGroup: rbac.authorization.k8s.io
