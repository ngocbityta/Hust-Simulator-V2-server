# Grafana NodePort để truy cập dashboard từ host
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: hustsim
  labels:
    app: grafana
    app.kubernetes.io/part-of: hustsimulator
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
