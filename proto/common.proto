syntax = "proto3";

package hustsimulator.common;

option java_package = "com.hustsimulator.context.grpc.proto";
option java_outer_classname = "CommonProto";

// Shared coordinate type for map positions
message Coordinates {
  double latitude = 1;
  double longitude = 2;
}

// UUID wrapper
message UUID {
  string value = 1;
}

// Timestamp wrapper (Unix milliseconds)
message Timestamp {
  int64 millis = 1;
}

// Generic status response
message StatusResponse {
  bool success = 1;
  string message = 2;
}
