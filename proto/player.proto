syntax = "proto3";

package hustsimulator.player;

import "common.proto";
import "google/protobuf/empty.proto";

option java_package = "com.hustsimulator.context.grpc.proto";
option java_outer_classname = "PlayerProto";

// User activity state enum
enum UserActivityState {
  USER_ACTIVITY_STATE_UNSPECIFIED = 0;
  ROAMING = 1;            // Moving on map via GPS
  IN_RECURRING_EVENT = 2; // Inside a recurring event
  IN_EVENT = 3;           // Participating in an event
  OUTSIDE_MAP = 4;
  IN_BUILDING = 5;
  SPECTATING_BUILDING = 6;
  IN_ROOM = 7;
  SPECTATING_EVENT = 8;
  SPECTATING_RECURRING_EVENT = 9;
}

// User position update sent from game-server to context-service
message UserPositionUpdate {
  string user_id = 1;
  hustsimulator.common.Coordinates position = 2;
  hustsimulator.common.Timestamp timestamp = 3;
  float speed = 4;       // Current movement speed
  float heading = 5;     // Direction in degrees
}

// Request to get nearby users
message NearbyUsersRequest {
  string user_id = 1;
  hustsimulator.common.Coordinates position = 2;
  double radius = 3;     // Radius in meters
}

// User info in nearby response
message UserInfo {
  string user_id = 1;
  string username = 2;
  string avatar = 3;
  hustsimulator.common.Coordinates position = 4;
  bool is_online = 5;
  UserActivityState activity_state = 6;
}

message NearbyUsersResponse {
  repeated UserInfo users = 1;
}

// Batch position update (multiple users)
message BatchPositionUpdate {
  repeated UserPositionUpdate updates = 1;
}

// User connection events
message UserConnectionEvent {
  string user_id = 1;
  bool is_connected = 2;
  hustsimulator.common.Timestamp timestamp = 3;
}

// Service: Game Server exposes user state to Context Service
service UserStateService {
  // Get users near a location
  rpc GetNearbyUsers(NearbyUsersRequest) returns (NearbyUsersResponse);

  // Stream of position updates from game-server to context-service
  rpc StreamPositionUpdates(stream UserPositionUpdate) returns (google.protobuf.Empty);

  // Notify context-service about user connection/disconnection
  rpc NotifyUserConnection(UserConnectionEvent) returns (google.protobuf.Empty);
}
