syntax = "proto3";

package prediction;

service PredictionService {
  rpc PredictNextLocation (PredictNextLocationRequest) returns (PredictNextLocationResponse);
}

message PredictNextLocationRequest {
  string user_id = 1;
  // We can include current context if needed
  double current_heading = 2;
  optional int64 target_timestamp_ms = 3;
}

message PoiPrediction {
  string poi_id = 1;
  string poi_name = 2;
  double probability = 3;
  double lat = 4;
  double lng = 5;
}

message PredictNextLocationResponse {
  string predicted_poi_id = 1;
  string predicted_poi_name = 2;
  double confidence = 3;
  string intent_type = 4; // e.g., "GOING_TO_EVENT", "WANDERING"
  double target_lat = 5;
  double target_lng = 6;
  repeated PoiPrediction candidate_destinations = 7;
}
