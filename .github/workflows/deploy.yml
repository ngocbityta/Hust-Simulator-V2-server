name: Build and Deploy to GKE

on:
  push:
    branches:
      - main
    paths:
      - 'api-gateway/**'
      - 'auth-service/**'
      - 'context-service/**'
      - 'social-service/**'
      - 'streaming-service/**'
      - 'state-dissemination-service/**'
      - 'state-computation-service/**'
      - 'interest-matcher-service/**'
      - 'prediction-service/**'
      - 'proto/**'
      - 'k8s/**'
  workflow_dispatch:

env:
  PROJECT_ID: hustsimulator
  GAR_LOCATION: asia-southeast1
  REPOSITORY: hustsim-repo
  CLUSTER_NAME: hustsim-cluster
  CLUSTER_ZONE: asia-southeast1
  NAMESPACE: hustsim

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    # ── Xác thực với Google Cloud ──
    - id: auth
      name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    # ── Lấy credentials để điều khiển K8s cluster ──
    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.CLUSTER_NAME }}
        location: ${{ env.CLUSTER_ZONE }}

    # ── Build và Push Docker Images (chỉ service có thay đổi) ──
    - name: Detect Changed Services
      id: detect
      run: |-
        # Lấy danh sách files thay đổi so với commit trước
        # Với fetch-depth: 2, HEAD~1 luôn khả dụng
        # workflow_dispatch hoặc first push → build all
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] || ! git rev-parse HEAD~1 >/dev/null 2>&1; then
          echo "force_build_all=true" >> $GITHUB_OUTPUT
          CHANGED_SERVICES="api-gateway auth-service context-service social-service streaming-service state-dissemination-service state-computation-service interest-matcher-service prediction-service"
        else
          echo "force_build_all=false" >> $GITHUB_OUTPUT
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Map file paths to services
          CHANGED_SERVICES=""
          for file in $CHANGED_FILES; do
            case "$file" in
              api-gateway/*) CHANGED_SERVICES="$CHANGED_SERVICES api-gateway" ;;
              auth-service/*) CHANGED_SERVICES="$CHANGED_SERVICES auth-service" ;;
              context-service/*) CHANGED_SERVICES="$CHANGED_SERVICES context-service" ;;
              social-service/*) CHANGED_SERVICES="$CHANGED_SERVICES social-service" ;;
              streaming-service/*) CHANGED_SERVICES="$CHANGED_SERVICES streaming-service" ;;
              state-dissemination-service/*) CHANGED_SERVICES="$CHANGED_SERVICES state-dissemination-service" ;;
              state-computation-service/*) CHANGED_SERVICES="$CHANGED_SERVICES state-computation-service" ;;
              interest-matcher-service/*) CHANGED_SERVICES="$CHANGED_SERVICES interest-matcher-service" ;;
              prediction-service/*) CHANGED_SERVICES="$CHANGED_SERVICES prediction-service" ;;
              proto/*) CHANGED_SERVICES="$CHANGED_SERVICES context-service social-service streaming-service state-dissemination-service state-computation-service interest-matcher-service prediction-service" ;;
              k8s/*) echo "k8s config changed: $file" ;;
            esac
          done

          # Loại bỏ trùng lặp
          CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
        fi

        echo "changed_services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT
        echo "📋 Changed services: $CHANGED_SERVICES"

    - name: Build and Push Docker Images
      run: |-
        REGISTRY="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}"
        CHANGED_SERVICES="${{ steps.detect.outputs.changed_services }}"

        if [ -z "$CHANGED_SERVICES" ]; then
          echo "ℹ️ No service code changed — skipping image builds (only k8s manifests updated)"
          exit 0
        fi

        for svc in $CHANGED_SERVICES; do
          echo "============================================"
          echo "  Building: $svc"
          echo "============================================"
          IMAGE_NAME="$REGISTRY/$svc:latest"

          if [ "$svc" = "api-gateway" ]; then
            BUILD_CONTEXT="./api-gateway"
          else
            BUILD_CONTEXT="."
          fi

          docker build -t "$IMAGE_NAME" -f "$svc/Dockerfile" "$BUILD_CONTEXT"
          docker push "$IMAGE_NAME"
          echo "✅ Pushed $IMAGE_NAME"
        done

    # ── Apply K8s manifests (cập nhật configmap, secrets nếu có thay đổi) ──
    - name: Apply K8s Manifests
      run: |-
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -R -f k8s/infrastructure/
        kubectl apply -R -f k8s/services/
        kubectl apply -R -f k8s/monitoring/

    # ── Rollout restart chỉ service có thay đổi ──
    - name: Rollout Restart Deployments
      run: |-
        CHANGED_SERVICES="${{ steps.detect.outputs.changed_services }}"

        # Map service names to deployment names
        # interest-matcher-service → interest-matcher (StatefulSet)
        # admin-ui is deployed separately from admin repo, skip here

        if [ -z "$CHANGED_SERVICES" ]; then
          echo "ℹ️ No service code changed — only applying k8s manifests"
          exit 0
        fi

        for svc in $CHANGED_SERVICES; do
          if [ "$svc" = "interest-matcher-service" ]; then
            echo "🔄 Restarting StatefulSet interest-matcher..."
            kubectl rollout restart statefulset interest-matcher -n ${{ env.NAMESPACE }}
          else
            echo "🔄 Restarting deployment $svc..."
            kubectl rollout restart deployment "$svc" -n ${{ env.NAMESPACE }}
          fi
        done

    # ── Chờ rollout hoàn tất ──
    - name: Wait for Rollout to Complete
      run: |-
        CHANGED_SERVICES="${{ steps.detect.outputs.changed_services }}"

        if [ -z "$CHANGED_SERVICES" ]; then
          echo "ℹ️ No services were restarted — skipping rollout wait"
          exit 0
        fi

        FAILED=0
        for svc in $CHANGED_SERVICES; do
          if [ "$svc" = "interest-matcher-service" ]; then
            echo "⏳ Waiting for interest-matcher (StatefulSet)..."
            if ! kubectl rollout status statefulset interest-matcher -n ${{ env.NAMESPACE }} --timeout=900s; then
              echo "❌ Rollout failed for interest-matcher"
              FAILED=1
            else
              echo "✅ interest-matcher deployed successfully"
            fi
          else
            echo "⏳ Waiting for $svc..."
            if ! kubectl rollout status deployment "$svc" -n ${{ env.NAMESPACE }} --timeout=900s; then
              echo "❌ Rollout failed for $svc"
              FAILED=1
            else
              echo "✅ $svc deployed successfully"
            fi
          fi
        done

        if [ "$FAILED" -eq 1 ]; then
          echo "❌ One or more deployments failed!"
          exit 1
        fi

        echo "✅ All changed services deployed successfully!"
