plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.6'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.hustsimulator'
version = '0.0.1-SNAPSHOT'
description = 'Social API Service for HustSimulator V2'

java {
	sourceCompatibility = '17'
	targetCompatibility = '17'
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	// Spring Boot Starters
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-amqp'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-data-redis'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-validation'

	// Lombok
	compileOnly 'org.projectlombok:lombok:1.18.36'
	annotationProcessor 'org.projectlombok:lombok:1.18.36'

	// DevTools
	developmentOnly 'org.springframework.boot:spring-boot-devtools'

	// JTS Topology Suite for geometry and convex polygons
	implementation 'org.locationtech.jts:jts-core:1.19.0'
	implementation 'org.hibernate.orm:hibernate-spatial'

	// Database
	runtimeOnly 'org.postgresql:postgresql'

	// Swagger UI / OpenAPI
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

	// Observability & Tracing
	implementation 'io.micrometer:micrometer-registry-prometheus'

	// Security removed as it's offloaded to API Gateway

	// Test
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.amqp:spring-rabbit-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

// Automatically load environment variables from root .env for local development
tasks.named('bootRun') {
	systemProperties = System.properties
	def envFile = file("../.env")
	if (envFile.exists()) {
		envFile.eachLine { line ->
			def trimLine = line.trim()
			if (trimLine && !trimLine.startsWith("#")) {
				def parts = trimLine.split("=", 2)
				if (parts.length == 2) {
					environment parts[0].trim(), parts[1].trim()
				}
			}
		}
	}
}
