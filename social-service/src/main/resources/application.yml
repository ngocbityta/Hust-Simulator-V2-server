spring:
  application:
    name: social-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # PostgreSQL + PostGIS
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB_SOCIAL:hustsim_social}?sslmode=${POSTGRES_SSL:disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:prefer}
    username: ${POSTGRES_USER:hustsim}
    password: ${POSTGRES_PASSWORD:hustsim_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: ${HIBERNATE_DEFAULT_SCHEMA:social}
  sql:
    init:
      mode: never

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hustsim_redis}

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:hustsim}
    password: ${RABBITMQ_PASSWORD:hustsim_rabbit}

# Server
server:
  port: ${SOCIAL_SERVICE_PORT:8083}
  forward-headers-strategy: framework

hustsimulator:
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      upload-dir: ${STORAGE_LOCAL_DIR:./uploads}
      # Update base-url port to match social service or api-gateway
      base-url: ${STORAGE_LOCAL_URL:http://localhost:8083/uploads/}
    firebase:
      bucket: ${FIREBASE_STORAGE_BUCKET:}

# Socket.IO
socketio:
  host: 0.0.0.0
  port: 9092

# Actuator, Tracing, Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    url: /v3/api-docs
    operations-sorter: method
