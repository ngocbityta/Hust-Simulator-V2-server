spring:
  application:
    name: messaging-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # PostgreSQL (shared Neon Cloud)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:hustsimulator}?sslmode=${POSTGRES_SSL:disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:prefer}
    username: ${POSTGRES_USER:hustsim}
    password: ${POSTGRES_PASSWORD:hustsim_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:hustsim}
    password: ${RABBITMQ_PASSWORD:hustsim_rabbit}

hustsimulator:
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      upload-dir: ${STORAGE_LOCAL_DIR:./uploads}
      base-url: ${STORAGE_LOCAL_URL:http://localhost:8082/uploads/}
    firebase:
      bucket: ${FIREBASE_STORAGE_BUCKET:}

# Server
server:
  port: ${MESSAGING_SERVICE_PORT:8082}
  forward-headers-strategy: framework

# Socket.IO
socketio:
  host: 0.0.0.0
  port: 9092

# Actuator, Tracing, Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    url: /v3/api-docs
    operations-sorter: method
