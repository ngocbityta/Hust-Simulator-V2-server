services:
  redis:
    image: redis:7-alpine
    container_name: hustsim-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hustsim_redis} --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 64M
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hustsim_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hustsim-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5672 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── LiveKit Server ────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.5
    container_name: hustsim-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "8320:8320"
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  api-gateway:
    build: ./api-gateway
    container_name: hustsim-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service: { condition: service_started }
      context-service: { condition: service_started }
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: hustsim-auth-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    # No host ports — accessed via API Gateway only
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_AUTH:-hustsim_auth}?currentSchema=auth&sslmode=${POSTGRES_SSL:-disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:-prefer}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: auth
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      JAVA_OPTS: "-XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M



  # ─── Context Service ──────────────────────────────────
  context-service:
    build:
      context: .
      dockerfile: context-service/Dockerfile
    container_name: hustsim-context-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    # No host ports — accessed via API Gateway only
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_CONTEXT:-hustsim_context}?currentSchema=context&sslmode=${POSTGRES_SSL:-disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:-prefer}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "false"
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      JAVA_OPTS: "-XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  # ─── Social Service ────────────────────────────────────────────────
  social-service:
    build:
      context: .
      dockerfile: social-service/Dockerfile
    container_name: hustsim-social-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # No host ports — accessed via API Gateway only
    # Dev: expose 9092 (Socket.IO) and 8083 (REST) directly for Postman testing
    ports:
      - "9092:9092"
      - "8083:8083"
    volumes:
      - social_uploads:/app/uploads
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_SOCIAL:-hustsim_social}?currentSchema=social&sslmode=${POSTGRES_SSL:-disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:-prefer}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: social
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_DIR: ${STORAGE_LOCAL_DIR:-/app/uploads}
      STORAGE_LOCAL_URL: ${STORAGE_LOCAL_URL:-http://localhost/uploads/}
      JAVA_OPTS: "-XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M


  streaming-service:
    build:
      context: .
      dockerfile: streaming-service/Dockerfile
    container_name: hustsim-streaming-service
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      livekit: { condition: service_started }
    # No host ports — accessed via API Gateway only
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB_STREAMING:-hustsim_streaming}?currentSchema=streaming&sslmode=${POSTGRES_SSL:-disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:-prefer}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: streaming
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_CLIENT_URL: ${LIVEKIT_CLIENT_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      JAVA_OPTS: "-XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  state-dissemination-service:
    build:
      context: .
      dockerfile: state-dissemination-service/Dockerfile
    container_name: hustsim-state-dissemination-service
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      interest-matcher-0: { condition: service_started }
      interest-matcher-1: { condition: service_started }
      interest-matcher-2: { condition: service_started }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      COMPUTATION_SERVICE_HOST: state-computation-service
      CONTEXT_SERVICE_HOST: context-service
      GAME_SERVER_PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      NODE_OPTIONS: "--max-old-space-size=256"
      # Interest Matcher broker endpoints (zone routing)
      IM_ZONE_0_HOST: interest-matcher-0
      IM_ZONE_1_HOST: interest-matcher-1
      IM_ZONE_2_HOST: interest-matcher-2
      IM_BASE_PORT: "4000"
      IM_NUM_ZONES: "3"
      ZONE_1_LNG: "105.84"
      ZONE_2_LNG: "105.85"
      GRID_CELL_SIZE: "10"
      MAP_CENTER_LAT: "21.003"
      # Unique node ID for Redis Stream delivery routing
      DISS_NODE_ID: diss-node-0
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  state-computation-service:
    build:
      context: .
      dockerfile: state-computation-service/Dockerfile
    container_name: hustsim-state-computation-service
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      interest-matcher-0: { condition: service_started }
      interest-matcher-1: { condition: service_started }
      interest-matcher-2: { condition: service_started }
    ports:
      - "3003:3003"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      CONTEXT_SERVICE_HOST: context-service
      NODE_OPTIONS: "--max-old-space-size=256"
      LOG_LEVEL: debug
      USE_HEURISTIC_ONLY: ${USE_HEURISTIC_ONLY:-false}
      # Interest Matcher broker endpoints (zone routing)
      IM_ZONE_0_HOST: interest-matcher-0
      IM_ZONE_1_HOST: interest-matcher-1
      IM_ZONE_2_HOST: interest-matcher-2
      IM_BASE_PORT: "4000"
      IM_NUM_ZONES: "3"
      ZONE_1_LNG: "105.84"
      ZONE_2_LNG: "105.85"
      GRID_CELL_SIZE: "10"
      MAP_CENTER_LAT: "21.003"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 128M

  # ─── Interest Matcher Brokers (SPS multi-broker AOI) ─────────────────────
  # Each instance manages one spatial zone, implements the Interest Matcher
  # role as described in: "Spatial Publish/Subscribe for MMOGs" (MMVE '24).
  interest-matcher-0:
    build:
      context: .
      dockerfile: interest-matcher-service/Dockerfile
    container_name: hustsim-interest-matcher-0
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      ZONE_ID: "0"
      ZONE_1_LNG: "105.84"
      ZONE_2_LNG: "105.85"
      GRID_CELL_SIZE: "10"
      MAP_CENTER_LAT: "21.003"
      IM_BASE_PORT: "4000"
      # Format: host:port:zoneId
      NEIGHBOR_BROKERS: "interest-matcher-1:4001:1"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  interest-matcher-1:
    build:
      context: .
      dockerfile: interest-matcher-service/Dockerfile
    container_name: hustsim-interest-matcher-1
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      ZONE_ID: "1"
      ZONE_1_LNG: "105.84"
      ZONE_2_LNG: "105.85"
      GRID_CELL_SIZE: "10"
      MAP_CENTER_LAT: "21.003"
      IM_BASE_PORT: "4000"
      NEIGHBOR_BROKERS: "interest-matcher-0:4000:0,interest-matcher-2:4002:2"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  interest-matcher-2:
    build:
      context: .
      dockerfile: interest-matcher-service/Dockerfile
    container_name: hustsim-interest-matcher-2
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      ZONE_ID: "2"
      ZONE_1_LNG: "105.84"
      ZONE_2_LNG: "105.85"
      GRID_CELL_SIZE: "10"
      MAP_CENTER_LAT: "21.003"
      IM_BASE_PORT: "4000"
      NEIGHBOR_BROKERS: "interest-matcher-1:4001:1"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  prediction-service:
    build:
      context: .
      dockerfile: prediction-service/Dockerfile
    container_name: hustsim-prediction-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB_PREDICTION:-hustsim_prediction}
      POSTGRES_DB_CONTEXT: ${POSTGRES_DB_CONTEXT:-hustsim_context}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      VECLIB_MAXIMUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1
    volumes:
      - prediction_model_data:/app/model
    # No host ports — internal gRPC only (50055)
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  # ─── Monitoring ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: hustsim-loki
    # No host ports — accessed by Grafana internally
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  promtail:
    image: grafana/promtail:2.9.0
    container_name: hustsim-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: hustsim-prometheus
    # No host ports — accessed by Grafana internally
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  grafana:
    image: grafana/grafana:10.0.3
    container_name: hustsim-grafana
    ports:
      - "3003:3003"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: hustsim-admin
    restart: unless-stopped
    depends_on:
      auth-service: { condition: service_started }
      state-computation-service: { condition: service_started }
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  redis_data:
  rabbitmq_data:
  loki_data:
  prometheus_data:
  grafana_data:
  social_uploads:
  prediction_model_data:

