services:
  redis:
    image: redis:7-alpine
    container_name: hustsim-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hustsim_redis} --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hustsim_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hustsim-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── LiveKit Server ────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.5
    container_name: hustsim-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "8320:8320"
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    deploy:
      resources:
        limits:
          memory: 128M

  api-gateway:
    build: ./api-gateway
    container_name: hustsim-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service: { condition: service_started }
      messaging-service: { condition: service_started }
      context-service: { condition: service_started }
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 64M

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: hustsim-auth-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hustsimulator}?currentSchema=auth&sslmode=${POSTGRES_SSL:-disable}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: auth
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      JAVA_OPTS: "-Xmx384m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Messaging Service ─────────────────────────────────────────────
  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    container_name: hustsim-messaging-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${MESSAGING_SERVICE_PORT:-8082}:8082"
      - "9092:9092"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hustsimulator}?currentSchema=messaging&sslmode=${POSTGRES_SSL:-disable}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: messaging
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: "-Xmx384m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Context Service ──────────────────────────────────
  context-service:
    build:
      context: .
      dockerfile: context-service/Dockerfile
    container_name: hustsim-context-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${CONTEXT_SERVICE_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hustsimulator}?currentSchema=context&sslmode=${POSTGRES_SSL:-disable}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: context
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      JAVA_OPTS: "-Xmx384m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Social Service ────────────────────────────────────────────────
  social-service:
    build:
      context: .
      dockerfile: social-service/Dockerfile
    container_name: hustsim-social-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${SOCIAL_SERVICE_PORT:-8083}:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hustsimulator}?currentSchema=social&sslmode=${POSTGRES_SSL:-disable}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: social
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      JAVA_OPTS: "-Xmx384m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 512M

  streaming-service:
    build:
      context: .
      dockerfile: streaming-service/Dockerfile
    container_name: hustsim-streaming-service
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      livekit: { condition: service_started }
    ports:
      - "${STREAMING_SERVICE_PORT:-8084}:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hustsimulator}?currentSchema=streaming&sslmode=${POSTGRES_SSL:-disable}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hustsim}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: streaming
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      LIVEKIT_URL: http://livekit:7880
      JAVA_OPTS: "-Xmx384m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 512M

  state-dissemination-service:
    build:
      context: .
      dockerfile: state-dissemination-service/Dockerfile
    container_name: hustsim-state-dissemination-service
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?schema=state&sslmode=${POSTGRES_SSL:-disable}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      COMPUTATION_SERVICE_HOST: state-computation-service
      CONTEXT_SERVICE_HOST: context-service
      NODE_OPTIONS: "--max-old-space-size=256"
    deploy:
      resources:
        limits:
          memory: 128M

  state-computation-service:
    build:
      context: .
      dockerfile: state-computation-service/Dockerfile
    container_name: hustsim-state-computation-service
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    ports:
      - "50053:50053"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?schema=state&sslmode=${POSTGRES_SSL:-disable}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      CONTEXT_SERVICE_HOST: context-service
      NODE_OPTIONS: "--max-old-space-size=256"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis_data:
  rabbitmq_data:
