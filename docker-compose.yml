  redis:
    image: redis:7-alpine
    container_name: hustsim-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hustsim_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hustsim_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hustsim-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  context-service:
    build:
      context: .
      dockerfile: context-service/Dockerfile
    container_name: hustsim-context-service
    restart: unless-stopped
    depends_on:
#      postgres:
#        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${CONTEXT_SERVICE_PORT:-8080}:8080"
      - "${CONTEXT_SERVICE_GRPC_PORT:-50052}:50052"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hustsimulator}
      POSTGRES_USER: ${POSTGRES_USER:-hustsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      CONTEXT_SERVICE_PORT: 8080
      CONTEXT_SERVICE_GRPC_PORT: 50052
      GAME_SERVER_HOST: state-dissemination-service
      GAME_SERVER_GRPC_PORT: 50051

  state-dissemination-service:
    build:
      context: .
      dockerfile: state-dissemination-service/Dockerfile
    container_name: hustsim-state-dissemination-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      context-service:
        condition: service_started
      state-computation-service:
        condition: service_started
    ports:
      - "${GAME_SERVER_PORT:-3002}:3002"
      - "${GAME_SERVER_GRPC_PORT:-50051}:50051"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      CONTEXT_SERVICE_HOST: context-service
      CONTEXT_SERVICE_GRPC_PORT: 50052
      COMPUTATION_SERVICE_HOST: state-computation-service
      COMPUTATION_SERVICE_GRPC_PORT: 50053
      GAME_SERVER_PORT: 3002
      GAME_SERVER_GRPC_PORT: 50051

  state-computation-service:
    build:
      context: .
      dockerfile: state-computation-service/Dockerfile
    container_name: hustsim-state-computation-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      context-service:
        condition: service_started
    ports:
      - "${COMPUTATION_SERVICE_PORT:-3003}:3003"
      - "${COMPUTATION_SERVICE_GRPC_PORT:-50053}:50053"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      CONTEXT_SERVICE_HOST: context-service
      CONTEXT_SERVICE_GRPC_PORT: 50052
      COMPUTATION_SERVICE_GRPC_PORT: 50053

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
