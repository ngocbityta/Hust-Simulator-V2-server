services:
  redis:
    image: redis:7-alpine
    container_name: hustsim-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hustsim_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hustsim_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hustsim-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── LiveKit Server ────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.5
    container_name: hustsim-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "8320:8320"
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

  # ─── DB Migration Service ──────────────────────────────────────────
  db-migration:
    image: flyway/flyway:10-alpine
    container_name: hustsim-db-migration
    command: -url=jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hustsimulator}?sslmode=${POSTGRES_SSL:-disable} -user=${POSTGRES_USER:-hustsim} -password=${POSTGRES_PASSWORD:-hustsim_secret} -schemas=public -baselineOnMigrate=true migrate
    volumes:
      - ./db-migration/sql:/flyway/sql

  # ─── API Gateway ────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: hustsim-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      messaging-service:
        condition: service_started
      context-service:
        condition: service_started
      state-dissemination-service:
        condition: service_started
      streaming-service:
        condition: service_started
    ports:
      - "80:80"

  # ─── Auth Service ──────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: hustsim-auth-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hustsimulator}
      POSTGRES_USER: ${POSTGRES_USER:-hustsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      POSTGRES_CHANNEL_BINDING: ${POSTGRES_CHANNEL_BINDING:-prefer}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AUTH_SERVICE_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}

  # ─── Messaging Service ─────────────────────────────────────────────
  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    container_name: hustsim-messaging-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${MESSAGING_SERVICE_PORT:-8082}:8082"
      - "9092:9092"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hustsimulator}
      POSTGRES_USER: ${POSTGRES_USER:-hustsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      POSTGRES_CHANNEL_BINDING: ${POSTGRES_CHANNEL_BINDING:-prefer}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      MESSAGING_SERVICE_PORT: 8082
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_DIR: ${STORAGE_LOCAL_DIR:-./uploads}
      STORAGE_LOCAL_URL: ${STORAGE_LOCAL_URL:-http://localhost/uploads/}

  # ─── Context Service (refactored) ──────────────────────────────────
  context-service:
    build:
      context: .
      dockerfile: context-service/Dockerfile
    container_name: hustsim-context-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${CONTEXT_SERVICE_PORT:-8080}:8080"
      - "${CONTEXT_SERVICE_GRPC_PORT:-50052}:50052"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hustsimulator}
      POSTGRES_USER: ${POSTGRES_USER:-hustsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      POSTGRES_CHANNEL_BINDING: ${POSTGRES_CHANNEL_BINDING:-prefer}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      CONTEXT_SERVICE_PORT: 8080
      CONTEXT_SERVICE_GRPC_PORT: 50052
      GAME_SERVER_HOST: state-dissemination-service
      GAME_SERVER_GRPC_PORT: 50051
      # URL của messaging-service — dùng cho MessagingServiceClient (HTTP)
      MESSAGING_SERVICE_URL: http://messaging-service:8082

  # ─── Social Service ────────────────────────────────────────────────
  social-service:
    build:
      context: .
      dockerfile: social-service/Dockerfile
    container_name: hustsim-social-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${SOCIAL_SERVICE_PORT:-8083}:8083"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hustsimulator}
      POSTGRES_USER: ${POSTGRES_USER:-hustsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      POSTGRES_CHANNEL_BINDING: ${POSTGRES_CHANNEL_BINDING:-prefer}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      SOCIAL_SERVICE_PORT: 8083

  # ─── Streaming Service ─────────────────────────────────────────────
  streaming-service:
    build:
      context: .
      dockerfile: streaming-service/Dockerfile
    container_name: hustsim-streaming-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    ports:
      - "${STREAMING_SERVICE_PORT:-8084}:8084"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hustsimulator}
      POSTGRES_USER: ${POSTGRES_USER:-hustsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hustsim_secret}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      POSTGRES_CHANNEL_BINDING: ${POSTGRES_CHANNEL_BINDING:-prefer}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      STREAMING_SERVICE_PORT: 8084
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_URL: ${LIVEKIT_URL:-http://livekit:7880}

  state-dissemination-service:
    build:
      context: .
      dockerfile: state-dissemination-service/Dockerfile
    container_name: hustsim-state-dissemination-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      context-service:
        condition: service_started
      state-computation-service:
        condition: service_started
    ports:
      - "${GAME_SERVER_PORT:-3002}:3002"
      - "${GAME_SERVER_GRPC_PORT:-50051}:50051"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      CONTEXT_SERVICE_HOST: context-service
      CONTEXT_SERVICE_GRPC_PORT: 50052
      COMPUTATION_SERVICE_HOST: state-computation-service
      COMPUTATION_SERVICE_GRPC_PORT: 50053
      GAME_SERVER_PORT: 3002
      GAME_SERVER_GRPC_PORT: 50051

  state-computation-service:
    build:
      context: .
      dockerfile: state-computation-service/Dockerfile
    container_name: hustsim-state-computation-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      context-service:
        condition: service_started
    ports:
      - "${COMPUTATION_SERVICE_PORT:-3003}:3003"
      - "${COMPUTATION_SERVICE_GRPC_PORT:-50053}:50053"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hustsim_redis}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-hustsim}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-hustsim_rabbit}
      CONTEXT_SERVICE_HOST: context-service
      CONTEXT_SERVICE_GRPC_PORT: 50052
      COMPUTATION_SERVICE_GRPC_PORT: 50053


volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
