worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Map để detect OPTIONS preflight request
    map $request_method $is_options {
        default 0;
        OPTIONS 1;
    }

    # ─── Upstream definitions ──────────────────────────────────────────────
    upstream auth_service {
        server auth-service:8081;
    }

    upstream messaging_service {
        server messaging-service:8082;
    }

    upstream context_service {
        server context-service:8080;
    }
    
    upstream streaming_service {
        server streaming-service:8084;
    }
    
    upstream social_service {
        server social-service:8083;
    }

    upstream dissemination_service {
        server state-dissemination-service:3002;
    }

    upstream messaging_socketio {
        server messaging-service:9092;
    }

    # ─── Server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ─── CORS headers ─────────────────────────────────────────────────
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id' always;

        # Preflight requests
        location / {
            if ($is_options) {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id';
                return 204;
            }

            proxy_pass http://context_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # ─── Auth Validation ──────────────────────────────────────────────
        location = /auth-check {
            internal;
            proxy_pass http://auth_service/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $host;
        }

        # ─── Health check ─────────────────────────────────────────────────
        location = /health {
            add_header Content-Type application/json always;
            return 200 '{"status":"UP","service":"api-gateway"}';
        }

        # ─── Auth Service Swagger ──────────────────────────────────────────
        location /auth/swagger-ui/ {
            proxy_pass http://auth_service/swagger-ui/;
            proxy_redirect /swagger-ui/ /auth/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /auth;
        }
        location /auth/v3/api-docs {
            proxy_pass http://auth_service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /auth;
        }

        # ─── Messaging Service Swagger ─────────────────────────────────────
        location /messaging/swagger-ui/ {
            proxy_pass http://messaging_service/swagger-ui/;
            proxy_redirect /swagger-ui/ /messaging/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /messaging;
        }
        location /messaging/v3/api-docs {
            proxy_pass http://messaging_service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /messaging;
        }

        # ─── Social Service Swagger ────────────────────────────────────────
        location /social/swagger-ui/ {
            proxy_pass http://social_service/swagger-ui/;
            proxy_redirect /swagger-ui/ /social/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /social;
        }
        location /social/v3/api-docs {
            proxy_pass http://social_service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /social;
        }

        # ─── Streaming Service Swagger ─────────────────────────────────────
        location /streaming/swagger-ui/ {
            proxy_pass http://streaming_service/swagger-ui/;
            proxy_redirect /swagger-ui/ /streaming/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /streaming;
        }
        location /streaming/v3/api-docs {
            proxy_pass http://streaming_service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /streaming;
        }

        # ─── Auth Service routes ───────────────────────────────────────────
        # Đặt TRƯỚC /api/ để có priority cao hơn
        location /api/auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/users {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ─── Social Service routes ─────────────────────────────────────────
        location /api/posts {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://social_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }
        
        location /api/comments {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://social_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }
        
        location /api/interactions {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://social_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }

        # ─── Streaming Service routes ──────────────────────────────────────
        location /api/streams {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://streaming_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }

        # ─── Messaging Service routes ─────────────────────────────────────
        # Messages by event (regex → higher priority than prefix)
        location ~ ^/api/events/([^/]+)/messages {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://messaging_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }

        location /api/messages {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://messaging_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }

        location /api/storage {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://messaging_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
            client_max_body_size 50m;
        }

        location /uploads/ {
            proxy_pass http://messaging_service;
            proxy_set_header Host $host;
        }

        # ─── WebSocket (State Dissemination) ─── vị trí realtime ─────────────
        location /ws {
            # Note: WebSockets might need token in URL parameter natively, but auth_request handles headers
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://dissemination_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id $user_id;
            proxy_read_timeout 86400;
        }

        # ─── Socket.IO (Messaging Service) ─── class room chat realtime ──────
        location /socket.io/ {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://messaging_socketio;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id $user_id;
            proxy_read_timeout 86400;
        }

        # ─── Context Service actuator/swagger ─────────────────────────────
        location /swagger-ui/ {
            proxy_pass http://context_service/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /v3/api-docs {
            proxy_pass http://context_service/v3/api-docs;
            proxy_set_header Host $host;
        }
        location /actuator/ {
            proxy_pass http://context_service/actuator/;
            proxy_set_header Host $host;
        }

        # ─── Context Service (fallback cho tất cả /api/ còn lại) ──────────
        location /api/ {
            auth_request /auth-check;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_pass http://context_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
        }
    }
}
