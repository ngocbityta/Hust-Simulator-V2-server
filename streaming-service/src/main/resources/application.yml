spring:
  application:
    name: streaming-service

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:hustsimulator}?sslmode=${POSTGRES_SSL:disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:prefer}
    username: ${POSTGRES_USER:hustsim}
    password: ${POSTGRES_PASSWORD:hustsim_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hustsim_redis}
      repositories:
        enabled: false

# Server
server:
  port: ${STREAMING_SERVICE_PORT:8084}
  forward-headers-strategy: framework

# Actuator, Tracing, Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# LiveKit Configuration
livekit:
  api-key: ${LIVEKIT_API_KEY:devkey}
  api-secret: ${LIVEKIT_API_SECRET:secret}
  url: ${LIVEKIT_URL:http://localhost:7880}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    config-url: /streaming/v3/api-docs/swagger-config
    url: /streaming/v3/api-docs
    operations-sorter: method
