spring:
  application:
    name: auth-service

  # PostgreSQL (shared Neon Cloud)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:hustsimulator}?sslmode=${POSTGRES_SSL:disable}&channel_binding=${POSTGRES_CHANNEL_BINDING:prefer}
    username: ${POSTGRES_USER:hustsim}
    password: ${POSTGRES_PASSWORD:hustsim_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

  # Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_auth

hustsimulator:
  jwtSecret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000} # 24 hours

# Server
server:
  port: ${AUTH_SERVICE_PORT:8081}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
